# ─────────────────────────────────────────────────────────────
# P9I Marketing Site — netlify.toml
# Security hardened: Session 20 · 2026-04-13
# ─────────────────────────────────────────────────────────────

# ── Routing ───────────────────────────────────────────────────

# BT-112: source-attribution vanity redirects. These 301 a clean, memorable path
# to the tracked ?source= link (BT-125 captures `source` → signup_source + GA4) so
# the on-screen/typed URL stays clean AND type-in traffic attributes. MUST sit
# BEFORE the SPA catch-all below — Netlify evaluates top-to-bottom, first match
# wins, so the /* → /index.html (200) rewrite would otherwise swallow these
# (the precedence gotcha from the TARN cutover). Exact-path matches: /yt does not
# catch /yt-v2a; specific variants listed first for clarity.
[[redirects]]
  from = "/yt-v2a"
  to = "/?source=yt-v2a"
  status = 301
[[redirects]]
  from = "/yt-v2b"
  to = "/?source=yt-v2b"
  status = 301
[[redirects]]
  from = "/yt"
  to = "/?source=yt"
  status = 301
[[redirects]]
  from = "/tt"
  to = "/?source=tiktok"
  status = 301
[[redirects]]
  from = "/ig"
  to = "/?source=ig"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security Headers (all routes) ─────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), payment=(), usb=(), bluetooth=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://hq.project9ind.com https://hq.project9tech.com https://volrckfyznnhamdunact.supabase.co https://api.stripe.com https://www.google-analytics.com https://www.facebook.com; frame-src https://js.stripe.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';"

# ── Static Asset Caching ───────────────────────────────────────

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"